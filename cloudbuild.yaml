# [START cloudbuild_quickstart_build]
steps:
    # -------------------- Build docker image from dockerfile in the root of the repo ---------------------------------
    - name: 'gcr.io/cloud-builders/docker'
      args:
          - build
          - '--no-cache'
          - '-t'
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
          - .
          - '-f'
          - Dockerfile
      id: 'build'
      secretEnv:
          - 'PORT=$BACKEND_PORT'
          - 'RABBITMQ_URL_AWS=$BACKEND_RABBITMQ_URL_AWS'
          - 'SENDGRID_API_KEY=$BACKEND_SENDGRID_API_KEY'
          - 'DATABASE_URL=$BACKEND_DATABASE_URL'
          - 'GOOGLE_APP_PASSWORD=$BACKEND_GOOGLE_APP_PASSWORD'

    # -------------------- Push to google repo ---------------------------------
    - name: gcr.io/cloud-builders/docker
      args:
          - push
          - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
      id: 'push'

    # -------------------- Deploy ---------------------------------
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
      args:
          - run
          - services
          - update
          - note-app-react
          - '--platform=managed'
          - '--image=$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
          - >-
              --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS
          - '--region=$_DEPLOY_REGION'
          - '--quiet'
      id: Deploy
      entrypoint: gcloud
      waitFor: ['push']
images:
    - '$LOCATION-docker.pkg.dev/$PROJECT_ID/nudgenest-backend-service/nudgenest-backend-service:$COMMIT_SHA'
options:
    logging: CLOUD_LOGGING_ONLY
    substitutionOption: ALLOW_LOOSE
substitutions:
    _DEPLOY_REGION: europe-west1
    _GCR_HOSTNAME: eu.gcr.io
    _PLATFORM: managed
tags:
    - gcp-cloud-build-deploy-cloud-run
    - gcp-cloud-build-deploy-cloud-run-managed
    - nudgenest-backend-service

availableSecrets:
    secretManager:
        - versionName: 'projects/$PROJECT_ID/secrets/VERSION/versions/1'
          env: 'BACKEND_PORT'
        - versionName: 'projects/$PROJECT_ID/secrets/SERVICE_NAME/versions/1'
          env: 'BACKEND_RABBITMQ_URL_AWS'
        - versionName: 'projects/$PROJECT_ID/secrets/DB_CONNECTION_STRING/versions/1'
          env: 'BACKEND_SENDGRID_API_KEY'
        - versionName: 'projects/$PROJECT_ID/secrets/TEST_DB_CONNECTION_STRING/versions/1'
          env: 'BACKEND_DATABASE_URL'
        - versionName: 'projects/$PROJECT_ID/secrets/FIREBASE_APIKEY/versions/1'
          env: 'BACKEND_GOOGLE_APP_PASSWORD'
# [END cloudbuild_quickstart_build]
